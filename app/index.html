<!DOCTYPE html>
<html>
<head>
    <title>Medivault AI</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#f5f7fa;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            width:900px;
            height:90vh;
            background:white;
            border-radius:15px;
            display:flex;
            flex-direction:column;
            overflow:hidden;
            box-shadow:0 10px 30px rgba(0,0,0,0.1);
        }

        .header{
            background:#0f766e;
            color:white;
            padding:20px;
            font-size:24px;
            font-weight:bold;
        }

        .chat{
            flex:1;
            overflow-y:auto;
            padding:20px;
        }

        .message{
            margin-bottom:15px;
            max-width:80%;
            padding:12px;
            border-radius:12px;
            line-height:1.5;
        }

        .user{
            background:#0f766e;
            color:white;
            margin-left:auto;
        }

        .bot{
            background:#f1f5f9;
            color:black;
        }

        .input-area{
            display:flex;
            padding:15px;
            border-top:1px solid #ddd;
        }

        input{
            flex:1;
            padding:12px;
            border:1px solid #ccc;
            border-radius:10px;
            font-size:16px;
        }

        button{
            margin-left:10px;
            padding:12px 20px;
            border:none;
            background:#0f766e;
            color:white;
            border-radius:10px;
            cursor:pointer;
        }

        button:hover{
            background:#115e59;
        }

        .sources{
            margin-top:10px;
            font-size:12px;
            color:#666;
        }

        .metrics{
            margin-top:10px;
            font-size:12px;
            color:#888;
        }

    </style>
</head>

<body>

<div class="container">

    <div class="header">
        🩺 Medivault AI
    </div>

    <div id="chat" class="chat"></div>

    <div class="input-area">

        <input
            id="query"
            type="text"
            placeholder="Ask a medical question..."
        >

        <button onclick="sendMessage()">
            Send
        </button>

    </div>

</div>

<script>

const API_URL = "http://127.0.0.1:8000/ask";

function addMessage(text,type){

    const chat = document.getElementById("chat");

    const div = document.createElement("div");

    div.className = `message ${type}`;

    div.innerHTML = text;

    chat.appendChild(div);

    chat.scrollTop = chat.scrollHeight;
}

async function sendMessage(){

    const input = document.getElementById("query");

    const query = input.value.trim();

    if(!query) return;

    addMessage(query,"user");

    input.value = "";

    addMessage("Thinking...","bot");

    const botMessage =
        document.querySelectorAll(".bot");

    const placeholder =
        botMessage[botMessage.length - 1];

    try{

        const response = await fetch(
            API_URL,
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    query:query
                })
            }
        );

        const data = await response.json();

        let html = `
            <div>
                ${data.answer}
            </div>
        `;

        if(data.sources){

            html += `
            <div class="sources">
                <b>Sources:</b><br>
            `;

            data.sources.forEach(source => {

                html += `
                • ${source.source}
                (Page ${source.page})<br>
                `;
            });

            html += `</div>`;
        }

        if(data.metrics){

            html += `
            <div class="metrics">
                Total Time:
                ${data.metrics.total_time?.toFixed(2)}s
            </div>
            `;
        }

        placeholder.innerHTML = html;

    }

    catch(error){

        placeholder.innerHTML =
            "Error connecting to API.";
    }
}

document
.getElementById("query")
.addEventListener(
    "keypress",
    function(event){

        if(event.key==="Enter"){
            sendMessage();
        }
    }
);

</script>

</body>
</html>
